const fC=a=>(!a&&a!==0)?'Rs. 0.00':'Rs. '+Number(a).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fD=d=>{if(!d)return'—';try{return new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})}catch(e){return String(d)}};
const fDT=d=>{if(!d)return'—';try{const x=new Date(d);return x.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})+', '+x.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}catch(e){return String(d)}};
const isValidPhone=(phone)=>{const cleaned=String(phone||'').replace(/\D/g,'');return cleaned.length>=9&&cleaned.length<=12};
const RET_REASONS=['Defective product','Wrong item delivered','Customer changed mind','Damaged in transit','Not as described','Warranty claim','Other'];
const CATEGORIES=['Mobile Phones','Laptops','Appliances','Accessories'];
const CAT_PREFIX={'Mobile Phones':'MOB','Laptops':'LAP','Appliances':'APP','Accessories':'ACC'};

const buildWhatsAppURL=(phone,receipt)=>{
  let ph=String(phone||'').replace(/\D/g,'');
  if(ph.startsWith('0'))ph='94'+ph.substring(1);
  else if(!ph.startsWith('94'))ph='94'+ph;
  let msg=`🧾 *LIYANAGE ELECTRONICS*\n📋 Invoice: ${receipt.saleId}\n📅 ${fD(receipt.date)}\n${'─'.repeat(24)}\n`;
  receipt.items.forEach(it=>{msg+=`▸ ${it.productName}\n  ${it.qty} × ${fC(it.unitPrice)} = ${fC(it.lineTotal)}\n`});
  msg+=`${'─'.repeat(24)}\n`;
  if(receipt.discountPct>0)msg+=`💰 Discount (${receipt.discountPct}%): -${fC(receipt.discountAmount)}\n`;
  msg+=`✅ *TOTAL: ${fC(receipt.grandTotal)}*\n💳 Paid by: ${receipt.paymentMethod}\n`;
  if(receipt.paymentMethod==='Cash'&&receipt.cashTendered>0){
    msg+=`💵 Cash: ${fC(receipt.cashTendered)}\n🔄 Change: ${fC(receipt.change)}\n`;
  }
  msg+=`\nThank you for your purchase!\nඅපේ සාප්පුවෙන් මිලදී ගැනීමට ස්තූතියි!\n\n_Powered by Mahesh Web App Solution_`;
  return `https://wa.me/${ph}?text=${encodeURIComponent(msg)}`;
};

const Toasts=({toasts,rm})=>{
  if(!toasts.length) return null;
  const s={success:{b:'border-emerald-200',i:'check-circle',c:'text-emerald-500',p:'bg-emerald-500'},error:{b:'border-rose-200',i:'x-circle',c:'text-rose-500',p:'bg-rose-500'},info:{b:'border-brand-200',i:'info',c:'text-brand-500',p:'bg-brand-500'}};
  return (
    <div className="fixed bottom-4 right-4 sm:bottom-6 sm:right-6 z-[100] flex flex-col-reverse gap-3 pointer-events-none w-[calc(100%-2rem)] sm:w-auto" style={{maxWidth:380}}>
      {toasts.map(t=>{const st=s[t.type]||s.info;return (
        <div key={t.id} className={`bg-white border ${st.b} rounded-2xl shadow-2xl overflow-hidden animate-toast pointer-events-auto`}>
          <div className="flex items-start gap-3 p-4"><div className={`mt-0.5 ${st.c}`}><I n={st.i} s={20}/></div><div className="flex-1 min-w-0"><p className="text-sm font-semibold text-slate-800">{t.type==='success'?'සාර්ථකයි!':t.type==='error'?'දෝෂයක්':'තොරතුරු'}</p><p className="text-xs text-slate-500 mt-0.5 leading-relaxed">{t.message}</p></div><button onClick={()=>rm(t.id)} className="p-1 rounded-lg hover:bg-slate-100 text-slate-400"><I n="x" s={14}/></button></div>

};

const Dashboard=({data,loading})=>{
  const s=useMemo(()=>{
    if(!data?.sales) return null;
    const r=data.sales.reduce((a,x)=>a+(Number(x.TotalAmount)||0),0);
    const u=[...new Set(data.sales.map(x=>x.SaleID))].length;
    const p=data.products?.length||0;
    const l=data.products?.filter(x=>x.Status==='Low Stock'||x.StockQty<=x.MinStockLevel).length||0;
    const tr=data.returns?.length||0;
    const ra=data.returns?.reduce((a,x)=>a+(Number(x.RefundAmount)||0),0)||0;
    const profit=data.sales.reduce((a,sl)=>{
      const pr=data.products?.find(p=>p.ProductID===sl.ProductID);
      if(!pr) return a;
      return a+((Number(sl.UnitPrice)-Number(pr.CostPrice||0))*Number(sl.Qty));
    },0);
    return {r,u,p,l,tr,ra,profit};
  },[data]);

  const catData=useMemo(()=>{
    if(!data?.sales) return [];
    const m={};
    data.sales.forEach(s=>{
      if(!m[s.Category]) m[s.Category]={cat:s.Category,total:0,count:0};
      m[s.Category].total+=Number(s.TotalAmount)||0;
      m[s.Category].count+=Number(s.Qty)||0;
    });
    return Object.values(m).sort((a,b)=>b.total-a.total);
  },[data]);

  const recent=useMemo(()=>{
    if(!data?.sales) return [];
    const g={};
    data.sales.forEach(s=>{if(!g[s.SaleID])g[s.SaleID]={id:s.SaleID,date:s.Date,cust:s.CustomerName,pay:s.PaymentMethod,items:[],total:0};g[s.SaleID].items.push(s);g[s.SaleID].total+=Number(s.TotalAmount)||0});
    return Object.values(g).sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,6);
  },[data]);

  const lowItems=useMemo(()=>data?.products?.filter(p=>p.Status==='Low Stock'||p.StockQty<=p.MinStockLevel)||[],[data]);

  if(loading||!s) return <div className="space-y-5"><div className="grid grid-cols-2 xl:grid-cols-4 gap-3"><SkC/><SkC/><SkC/><SkC/></div><SkT/></div>;

  const catColors=['from-blue-400 to-blue-600','from-violet-400 to-violet-600','from-emerald-400 to-emerald-600','from-amber-400 to-amber-600','from-rose-400 to-rose-600'];
  const maxCatTotal=catData.length>0?catData[0].total:1;

  return (
    <div className="space-y-5 animate-fade-in">
      <div className="grid grid-cols-2 xl:grid-cols-4 gap-3 sm:gap-4">
        <SC title="Revenue" si="මුළු ආදායම" value={fC(s.r)} sub={`${s.u} orders`} icon="dollar-sign" grad="from-emerald-400 to-emerald-600"/>
        <SC title="Profit" si="ලාභය" value={fC(s.profit)} sub="Estimated" icon="trending-up" grad="from-brand-400 to-brand-600" delay={80}/>
        <SC title="Products" si="භාණ්ඩ" value={s.p} sub={`${s.l} low stock`} icon="package" grad="from-violet-400 to-violet-600" delay={160}/>
        <SC title="Returns" si="ආපසු" value={s.tr} sub={fC(s.ra)+' refunded'} icon="rotate-ccw" grad="from-amber-400 to-orange-500" delay={240}/>
      </div>

      {lowItems.length>0&&(
        <div className="bg-gradient-to-r from-rose-50 to-amber-50 rounded-2xl p-4 border border-rose-200 animate-slide-up" style={{animationDelay:'300ms'}}>
          <div className="flex items-center gap-2 mb-3"><I n="alert-triangle" s={16} c="text-rose-500 animate-bounce-subtle"/><span className="text-sm font-bold text-rose-700">⚠️ Low Stock Alerts (අඩු තොග අනතුරු ඇඟවීම්)</span></div>
          <div className="flex gap-2 overflow-x-auto pb-1">
            {lowItems.map(p=><div key={p.ProductID} className="flex-shrink-0 bg-white rounded-xl px-3 py-2 border border-rose-200 shadow-sm"><p className="text-xs font-semibold text-slate-700 whitespace-nowrap">{p.ProductName}</p><div className="flex items-center gap-2 mt-1"><span className="text-lg font-extrabold text-rose-600 animate-pulse-slow">{p.StockQty}</span><span className="text-[10px] text-slate-400">/ min {p.MinStockLevel}</span></div></div>)}
          </div>
        </div>
      )}

      <div className="grid grid-cols-1 xl:grid-cols-5 gap-4">
        {/* Category Breakdown */}
        <div className="xl:col-span-2 bg-white rounded-2xl shadow-sm border border-slate-100 p-5 animate-slide-up" style={{animationDelay:'200ms'}}>
          <h3 className="text-sm font-bold text-slate-800 mb-4">📊 Category Revenue (ප්‍රවර්ග ආදායම)</h3>
          <div className="space-y-3">
            {catData.map((c,i)=>(
              <div key={c.cat}>
                <div className="flex justify-between text-xs mb-1"><span className="font-medium text-slate-600">{c.cat}</span><span className="font-bold text-slate-800">{fC(c.total)}</span></div>
                <div className="h-2.5 bg-slate-100 rounded-full overflow-hidden"><div className={`h-full bg-gradient-to-r ${catColors[i%catColors.length]} rounded-full transition-all duration-1000`} style={{width:`${(c.total/maxCatTotal*100).toFixed(0)}%`}}/></div>
              </div>
            ))}
          </div>
        </div>

        {/* Recent Sales */}
        <div className="xl:col-span-3 bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden animate-fade-in" style={{animationDelay:'300ms'}}>
          <div className="px-5 py-4 border-b border-slate-100 flex items-center justify-between">
            <h3 className="text-sm font-bold text-slate-800">🕐 Recent Sales (මෑත විකුණුම්)</h3>
            <span className="text-xs font-semibold text-brand-600 bg-brand-50 px-2.5 py-1 rounded-lg">{s.u}</span>
          </div>
          <div className="overflow-x-auto">
            <table className="w-full min-w-[500px]">
              <thead><tr className="bg-slate-50/80">
                <th className="text-left px-5 py-3 text-[10px] font-semibold text-slate-500 uppercase">ID</th>
                <th className="text-left px-4 py-3 text-[10px] font-semibold text-slate-500 uppercase">Customer</th>
                <th className="text-left px-4 py-3 text-[10px] font-semibold text-slate-500 uppercase">Items</th>
                <th className="text-right px-5 py-3 text-[10px] font-semibold text-slate-500 uppercase">Amount</th>
              </tr></thead>
              <tbody className="divide-y divide-slate-50">
                {recent.map(r=>(
                  <tr key={r.id} className="rh">
                    <td className="px-5 py-3"><span className="text-xs font-bold text-brand-600 bg-brand-50 px-2 py-0.5 rounded">{r.id}</span><br/><span className="text-[10px] text-slate-400">{fD(r.date)}</span></td>
                    <td className="px-4 py-3 text-sm font-medium text-slate-700">{r.cust}</td>
                    <td className="px-4 py-3"><span className="text-sm text-slate-700">{r.items[0].ProductName.substring(0,18)}{r.items[0].ProductName.length>18?'...':''}</span>{r.items.length>1&&<span className="text-[10px] text-brand-500 ml-1">+{r.items.length-1}</span>}</td>
                    <td className="px-5 py-3 text-right text-sm font-bold text-slate-800">{fC(r.total)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  );
};

const Products=({data,loading,toast,setData})=>{
  const [q,sQ]=useState('');
  const [fc,sFc]=useState('All');
  const [showAdd,setShowAdd]=useState(false);
  const [editP,setEditP]=useState(null);
  const [viewP,setViewP]=useState(null);
  const [delP,setDelP]=useState(null);

  // Add product form state
  const emptyForm={productName:'',category:'Mobile Phones',brand:'',model:'',unitPrice:'',costPrice:'',stockQty:'',minStockLevel:'5',warrantyMonths:'12',supplier:''};
  const [form,setForm]=useState(emptyForm);
  const updateF=(k,v)=>setForm(p=>({...p,[k]:v}));

  const cats=useMemo(()=>{if(!data?.products)return['All'];return['All',...new Set(data.products.map(p=>p.Category))];},[data]);

  const list=useMemo(()=>{
    if(!data?.products) return [];
    return data.products.filter(p=>{
      const m=!q||p.ProductName.toLowerCase().includes(q.toLowerCase())||p.ProductID.toLowerCase().includes(q.toLowerCase())||p.Brand.toLowerCase().includes(q.toLowerCase());
      return m&&(fc==='All'||p.Category===fc);
    });
  },[data,q,fc]);

  const genId=(cat)=>{
    const prefix=CAT_PREFIX[cat]||'PRD';
    const existing=(data?.products||[]).filter(p=>p.ProductID.startsWith(prefix)).map(p=>parseInt(p.ProductID.replace(prefix,''))||0);
    const next=existing.length>0?Math.max(...existing)+1:1;
    return prefix+String(next).padStart(3,'0');
  };

  const handleAdd=()=>{
    if(!form.productName.trim()){toast('Product name is required','error');return}
    if(!form.brand.trim()){toast('Brand is required','error');return}
    if(!Number(form.unitPrice)){toast('Unit price is required','error');return}
    const newId=genId(form.category);
    const sQ2=Number(form.stockQty)||0;
    const mS=Number(form.minStockLevel)||5;
    const newProduct={
      ProductID:newId,ProductName:form.productName.trim(),Category:form.category,Brand:form.brand.trim(),Model:form.model.trim(),
      UnitPrice:Number(form.unitPrice),CostPrice:Number(form.costPrice)||0,StockQty:sQ2,MinStockLevel:mS,
      WarrantyMonths:Number(form.warrantyMonths)||0,Supplier:form.supplier.trim(),DateAdded:new Date().toISOString(),
      Status:sQ2<=mS?'Low Stock':'Active'
    };
    setData(prev=>({...prev,products:[...(prev.products||[]),newProduct]}));
    toast(`✅ ${form.productName} added (${newId})`,'success');
    setForm(emptyForm);
    setShowAdd(false);
  };

  const handleEdit=()=>{
    if(!form.productName.trim()){toast('Product name is required','error');return}
    const sQ2=Number(form.stockQty)||0;
    const mS=Number(form.minStockLevel)||5;
    setData(prev=>({...prev,products:(prev.products||[]).map(p=>p.ProductID===editP.ProductID?{...p,ProductName:form.productName.trim(),Category:form.category,Brand:form.brand.trim(),Model:form.model.trim(),UnitPrice:Number(form.unitPrice),CostPrice:Number(form.costPrice)||0,StockQty:sQ2,MinStockLevel:mS,WarrantyMonths:Number(form.warrantyMonths)||0,Supplier:form.supplier.trim(),Status:sQ2<=mS?'Low Stock':'Active'}:p)}));
    toast(`✏️ ${form.productName} updated`,'success');
    setEditP(null);
    setForm(emptyForm);
  };

  const handleDelete=()=>{
    setData(prev=>({...prev,products:(prev.products||[]).filter(p=>p.ProductID!==delP.ProductID)}));
    toast(`🗑️ ${delP.ProductName} deleted`,'info');
    setDelP(null);
  };

  const openEdit=(p)=>{
    setForm({productName:p.ProductName,category:p.Category,brand:p.Brand,model:p.Model||'',unitPrice:String(p.UnitPrice),costPrice:String(p.CostPrice||''),stockQty:String(p.StockQty),minStockLevel:String(p.MinStockLevel),warrantyMonths:String(p.WarrantyMonths||''),supplier:p.Supplier||''});
    setEditP(p);
  };

  const totalStock=(data?.products||[]).reduce((s,p)=>s+Number(p.StockQty),0);
  const totalValue=(data?.products||[]).reduce((s,p)=>s+Number(p.UnitPrice)*Number(p.StockQty),0);
  const lowCount=(data?.products||[]).filter(p=>p.Status==='Low Stock'||p.StockQty<=p.MinStockLevel).length;

  if(loading) return <SkT/>;

  // Product form (shared for add/edit)
  const renderForm=(isEdit)=>(
    <div className="p-5 space-y-3 overflow-y-auto flex-1">
      <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
        <div className="sm:col-span-2"><label className="text-[10px] text-slate-500 font-semibold uppercase">Product Name *</label><input type="text" value={form.productName} onChange={e=>updateF('productName',e.target.value)} className="w-full mt-1 px-4 py-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl input-ring" placeholder="e.g. Samsung Galaxy S25"/></div>
        <div><label className="text-[10px] text-slate-500 font-semibold uppercase">Category *</label><select value={form.category} onChange={e=>updateF('category',e.target.value)} className="w-full mt-1 px-4 py-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl input-ring appearance-none">{CATEGORIES.map(c=><option key={c}>{c}</option>)}</select></div>
        <div><label className="text-[10px] text-slate-500 font-semibold uppercase">Brand *</label><input type="text" value={form.brand} onChange={e=>updateF('brand',e.target.value)} className="w-full mt-1 px-4 py-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl input-ring" placeholder="e.g. Samsung"/></div>
        <div><label className="text-[10px] text-slate-500 font-semibold uppercase">Model</label><input type="text" value={form.model} onChange={e=>updateF('model',e.target.value)} className="w-full mt-1 px-4 py-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl input-ring" placeholder="e.g. S25 Ultra"/></div>
        <div><label className="text-[10px] text-slate-500 font-semibold uppercase">Supplier</label><input type="text" value={form.supplier} onChange={e=>updateF('supplier',e.target.value)} className="w-full mt-1 px-4 py-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl input-ring" placeholder="e.g. Samsung Lanka"/></div>
        <div><label className="text-[10px] text-slate-500 font-semibold uppercase">Selling Price (Rs.) *</label><input type="number" value={form.unitPrice} onChange={e=>updateF('unitPrice',e.target.value)} className="w-full mt-1 px-4 py-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl input-ring" placeholder="0"/></div>
        <div><label className="text-[10px] text-slate-500 font-semibold uppercase">Cost Price (Rs.)</label><input type="number" value={form.costPrice} onChange={e=>updateF('costPrice',e.target.value)} className="w-full mt-1 px-4 py-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl input-ring" placeholder="0"/></div>
        <div><label className="text-[10px] text-slate-500 font-semibold uppercase">Stock Qty</label><input type="number" value={form.stockQty} onChange={e=>updateF('stockQty',e.target.value)} className="w-full mt-1 px-4 py-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl input-ring" placeholder="0"/></div>
        <div><label className="text-[10px] text-slate-500 font-semibold uppercase">Min Stock Level</label><input type="number" value={form.minStockLevel} onChange={e=>updateF('minStockLevel',e.target.value)} className="w-full mt-1 px-4 py-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl input-ring" placeholder="5"/></div>
        <div><label className="text-[10px] text-slate-500 font-semibold uppercase">Warranty (Months)</label><input type="number" value={form.warrantyMonths} onChange={e=>updateF('warrantyMonths',e.target.value)} className="w-full mt-1 px-4 py-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl input-ring" placeholder="12"/></div>
      </div>
      {form.productName&&form.unitPrice&&(
        <div className="mt-3 p-3 bg-gradient-to-r from-brand-50 to-violet-50 rounded-xl border border-brand-100 animate-scale-in">
          <p className="text-[10px] text-slate-500 font-semibold mb-1">PREVIEW</p>
          <p className="text-sm font-bold text-slate-800">{form.productName}</p>
          <p className="text-xs text-slate-500">{form.brand} {form.model} • {form.category}</p>
          <p className="text-base font-extrabold text-brand-600 mt-1">{fC(Number(form.unitPrice))}</p>
          {form.costPrice&&Number(form.unitPrice)>Number(form.costPrice)&&<p className="text-[10px] text-emerald-600">Profit margin: {((1-Number(form.costPrice)/Number(form.unitPrice))*100).toFixed(1)}%</p>}
        </div>
      )}
    </div>
  );

  return (
    <div className="space-y-4 animate-fade-in">
      {/* Stats */}
      <div className="grid grid-cols-2 xl:grid-cols-4 gap-3">
        <SC title="Total Products" si="සමස්ත භාණ්ඩ" value={data.products?.length||0} icon="package" grad="from-brand-400 to-brand-600"/>
        <SC title="Total Stock" si="සමස්ත තොග" value={totalStock} icon="archive" grad="from-violet-400 to-violet-600" delay={80}/>

        <SC title="Low Stock" si="අඩු තොග" value={lowCount} icon="alert-triangle" grad="from-rose-400 to-rose-600" delay={240}/>
      </div>

      <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">

              <I n="search" s={15} c="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"/>

          <table className="w-full min-w-[600px]">

                      {p.CostPrice>0&&<p className="text-[10px] text-slate-400">Cost: {fC(p.CostPrice)}</p>}
                    </td>
                    <td className="px-4 py-3.5 text-center"><span className={`text-sm font-bold ${low?'text-rose-600 animate-pulse-slow':'text-slate-700'}`}>{p.StockQty}</span></td>
                    <td className="px-4 py-3.5 text-center"><span className={`inline-flex items-center gap-1 text-[10px] font-semibold px-2 py-0.5 rounded-full border ${low?'text-rose-700 bg-rose-50 border-rose-200':'text-emerald-700 bg-emerald-50 border-emerald-200'}`}><span className={`w-1.5 h-1.5 rounded-full ${low?'bg-rose-500 animate-pulse-dot':'bg-emerald-500'}`}/>{low?'Low':'Active'}</span></td>
                    <td className="px-4 py-3.5 text-center">
                      <div className="flex items-center justify-center gap-1">
                        <button onClick={()=>setViewP(p)} className="p-1.5 rounded-lg hover:bg-blue-50 text-slate-400 hover:text-blue-500 transition-colors" title="View"><I n="eye" s={14}/></button>
                        <button onClick={()=>openEdit(p)} className="p-1.5 rounded-lg hover:bg-amber-50 text-slate-400 hover:text-amber-500 transition-colors" title="Edit"><I n="edit" s={14}/></button>
                        <button onClick={()=>setDelP(p)} className="p-1.5 rounded-lg hover:bg-rose-50 text-slate-400 hover:text-rose-500 transition-colors" title="Delete"><I n="trash-2" s={14}/></button>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
        <div className="px-5 py-2 bg-slate-50/50 border-t border-slate-100"><p className="text-[10px] text-slate-400">{list.length} of {data.products?.length||0} products</p></div>
      </div>

      {/* Add Product Modal */}
      <Modal open={showAdd} onClose={()=>setShowAdd(false)} wide>
        <div className="bg-gradient-to-r from-brand-600 to-brand-700 px-5 py-4 flex items-center justify-between flex-shrink-0">
          <div className="flex items-center gap-3"><div className="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center"><I n="plus" s={20} c="text-white"/></div><div><h3 className="text-base font-bold text-white">Add New Product</h3><p className="text-xs text-brand-200">නව භාණ්ඩයක් එකතු කරන්න</p></div></div>
          <button onClick={()=>setShowAdd(false)} className="p-2 rounded-lg hover:bg-white/10 text-white"><I n="x" s={18}/></button>
        </div>
        {renderForm(false)}
        <div className="flex-shrink-0 px-5 py-3 bg-slate-50 border-t flex gap-3">
          <button onClick={()=>setShowAdd(false)} className="flex-1 py-2.5 bg-white border border-slate-200 text-sm font-semibold rounded-xl active:scale-95">Cancel</button>
          <button onClick={handleAdd} className="flex-1 py-2.5 bg-gradient-to-r from-brand-600 to-brand-700 text-white text-sm font-bold rounded-xl active:scale-95 shadow-lg"><I n="check-circle" s={16} c="inline -mt-0.5 mr-1"/>Add Product</button>
        </div>
      </Modal>

      {/* Edit Product Modal */}
      <Modal open={!!editP} onClose={()=>setEditP(null)} wide>
        <div className="bg-gradient-to-r from-amber-500 to-orange-500 px-5 py-4 flex items-center justify-between flex-shrink-0">
          <div className="flex items-center gap-3"><div className="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center"><I n="edit" s={20} c="text-white"/></div><div><h3 className="text-base font-bold text-white">Edit Product</h3><p className="text-xs text-amber-100">{editP?.ProductID} — භාණ්ඩය සංස්කරණය</p></div></div>
          <button onClick={()=>setEditP(null)} className="p-2 rounded-lg hover:bg-white/10 text-white"><I n="x" s={18}/></button>
        </div>
        {renderForm(true)}
        <div className="flex-shrink-0 px-5 py-3 bg-slate-50 border-t flex gap-3">
          <button onClick={()=>setEditP(null)} className="flex-1 py-2.5 bg-white border border-slate-200 text-sm font-semibold rounded-xl active:scale-95">Cancel</button>
          <button onClick={handleEdit} className="flex-1 py-2.5 bg-gradient-to-r from-amber-500 to-orange-500 text-white text-sm font-bold rounded-xl active:scale-95 shadow-lg"><I n="check-circle" s={16} c="inline -mt-0.5 mr-1"/>Save Changes</button>
        </div>
      </Modal>

      {/* View Product Modal */}
      <Modal open={!!viewP} onClose={()=>setViewP(null)}>
        {viewP&&(
          <React.Fragment>
            <div className="bg-gradient-to-r from-violet-600 to-brand-600 px-5 py-4 flex items-center justify-between flex-shrink-0">
              <div><h3 className="text-base font-bold text-white">{viewP.ProductName}</h3><p className="text-xs text-violet-200">{viewP.ProductID} • {viewP.Brand}</p></div>
              <button onClick={()=>setViewP(null)} className="p-2 rounded-lg hover:bg-white/10 text-white"><I n="x" s={18}/></button>
            </div>
            <div className="p-5 space-y-3">
              {[['Category',viewP.Category],['Brand / Model',`${viewP.Brand} ${viewP.Model||''}`],['Selling Price',fC(viewP.UnitPrice)],['Cost Price',fC(viewP.CostPrice||0)],['Profit Margin',viewP.CostPrice?((1-viewP.CostPrice/viewP.UnitPrice)*100).toFixed(1)+'%':'—'],['Stock',`${viewP.StockQty} units (Min: ${viewP.MinStockLevel})`],['Warranty',`${viewP.WarrantyMonths||0} months`],['Supplier',viewP.Supplier||'—'],['Date Added',fD(viewP.DateAdded)],['Status',viewP.Status]].map(([k,v])=>(
                <div key={k} className="flex justify-between py-2 border-b border-slate-50">
                  <span className="text-xs text-slate-500">{k}</span>
                  <span className={`text-sm font-semibold ${k==='Status'?(v==='Low Stock'?'text-rose-600':'text-emerald-600'):'text-slate-800'}`}>{v}</span>
                </div>
              ))}
            </div>
          </React.Fragment>
        )}
      </Modal>

      {/* Delete Confirmation */}
      <Modal open={!!delP} onClose={()=>setDelP(null)}>
        {delP&&(
          <React.Fragment>
            <div className="p-6 text-center">
              <div className="w-14 h-14 mx-auto bg-rose-100 rounded-full flex items-center justify-center mb-4"><I n="trash-2" s={24} c="text-rose-500"/></div>
              <h3 className="text-lg font-bold text-slate-800">Delete Product?</h3>
              <p className="text-sm text-slate-500 mt-2">"{delP.ProductName}" permanently delete කරන්නද?</p>
              <p className="text-xs text-slate-400 mt-1">මෙය ආපසු හැරවිය නොහැක</p>
            </div>
            <div className="px-6 pb-6 flex gap-3">
              <button onClick={()=>setDelP(null)} className="flex-1 py-2.5 bg-white border border-slate-200 text-sm font-semibold rounded-xl active:scale-95">No, Cancel</button>
              <button onClick={handleDelete} className="flex-1 py-2.5 bg-gradient-to-r from-rose-500 to-rose-600 text-white text-sm font-bold rounded-xl active:scale-95 shadow-lg">Yes, Delete</button>
            </div>
          </React.Fragment>
        )}
      </Modal>
    </div>
  );
};

// NEW SALE (POS)
// ============================================================
const NewSale=({data,loading,toast,setData})=>{
  const [cart,setCart]=useState([]);
  const [sp,sSp]=useState('');
  const [aq,sAq]=useState(1);
  const [dp,sDp]=useState(0);
  const [cn,sCn]=useState('');
  const [cp,sCp]=useState('');
  const [pm,sPm]=useState('Cash');
  const [ct,sCt]=useState('');
  const [sb,sSb]=useState('Nimal');
  const [sub,sSub]=useState(false);
  const [rec,sRec]=useState(null);
  const [pq,sPq]=useState('');

  const prods=useMemo(()=>data?.products?.filter(p=>p.StockQty>0)||[],[data]);
  const selP=useMemo(()=>prods.find(p=>p.ProductID===sp),[prods,sp]);

  const filteredProds=useMemo(()=>{
    if(!pq.trim()) return [];
    return prods.filter(p=>p.ProductName.toLowerCase().includes(pq.toLowerCase())||p.ProductID.toLowerCase().includes(pq.toLowerCase())).slice(0,5);
  },[prods,pq]);

  const st=cart.reduce((s,i)=>s+i.up*i.qty,0);
  const da=Math.round(st*dp/100);
  const gt=st-da;

  const quickAmounts=useMemo(()=>{
    if(gt<=0) return [];
    const bases=[500,1000,2000,5000,10000,20000,50000,100000,200000,500000];
    return bases.filter(a=>a>=gt).slice(0,4);
  },[gt]);

  const canCO=cart.length>0&&gt>0&&(pm!=='Cash'||Number(ct)>=gt);

  const quickAdd=(p)=>{
    const ex=cart.find(c=>c.pid===p.ProductID);
    const cq=ex?ex.qty:0;
    if(cq+1>p.StockQty){toast(`Only ${p.StockQty-cq} left`,'error');return}
    if(ex) setCart(cart.map(c=>c.pid===p.ProductID?{...c,qty:c.qty+1}:c));
    else setCart([...cart,{pid:p.ProductID,name:p.ProductName,brand:p.Brand,cat:p.Category,up:p.UnitPrice,qty:1}]);
    toast(`Added ${p.ProductName}`,'success');
    sPq('');
  };

  const addC=()=>{
    if(!selP) return;
    const ex=cart.find(c=>c.pid===selP.ProductID);
    const cq=ex?ex.qty:0;
    if(cq+aq>selP.StockQty){toast(`Only ${selP.StockQty-cq} left in stock`,'error');return}
    if(ex) setCart(cart.map(c=>c.pid===selP.ProductID?{...c,qty:c.qty+aq}:c));
    else setCart([...cart,{pid:selP.ProductID,name:selP.ProductName,brand:selP.Brand,cat:selP.Category,up:selP.UnitPrice,qty:aq}]);
    toast(`Added ${selP.ProductName}`,'success');
    sSp('');sAq(1);
  };

  const reset=()=>{setCart([]);sSp('');sAq(1);sDp(0);sCn('');sCp('');sPm('Cash');sCt('');sRec(null);sPq('')};

  const checkout=async()=>{
    if(!canCO) return;
    sSub(true);
    try{
      await new Promise(r=>setTimeout(r,800));
      const ids=data.sales?[...new Set(data.sales.map(s=>s.SaleID))]:[];
      const mx=ids.reduce((m,id)=>Math.max(m,parseInt(id.replace(/\D/g,''))||0),0);
      const sid='S'+String(mx+1).padStart(4,'0');
      const now=new Date().toISOString();

      const rawLineTotals=cart.map(c=>c.up*c.qty);
      const rawSum=rawLineTotals.reduce((s,v)=>s+v,0);
      let allocated=0;
      const ri=cart.map((c,idx)=>{
        let lineTotal;
        if(idx===cart.length-1){lineTotal=gt-allocated}else{lineTotal=rawSum>0?Math.round(gt*(c.up*c.qty)/rawSum):0}
        allocated+=lineTotal;
        return {productId:c.pid,productName:c.name,qty:c.qty,unitPrice:c.up,lineTotal};
      });

      const cashNum=pm==='Cash'?Number(ct):0;
      sRec({saleId:sid,date:now,items:ri,subtotal:st,discountPct:dp,discountAmount:da,grandTotal:gt,customerName:cn||'Walk-in',customerPhone:cp,paymentMethod:pm,soldBy:sb,cashTendered:cashNum,change:pm==='Cash'?cashNum-gt:0});

      setData(prev=>{
        const up=(prev.products||[]).map(p=>{const ci=cart.find(c=>c.pid===p.ProductID);if(ci){const nq=p.StockQty-ci.qty;return{...p,StockQty:nq,Status:nq<=p.MinStockLevel?'Low Stock':'Active'}}return p});
        let allocSale=0;
        const nsr=cart.map((c,idx)=>{let lineAmt;if(idx===cart.length-1){lineAmt=gt-allocSale}else{lineAmt=rawSum>0?Math.round(gt*(c.up*c.qty)/rawSum):0}allocSale+=lineAmt;return{SaleID:sid,Date:now,ProductID:c.pid,ProductName:c.name,Category:c.cat,Qty:c.qty,UnitPrice:c.up,DiscountPct:dp,TotalAmount:lineAmt,CustomerName:cn||'Walk-in',CustomerPhone:cp,PaymentMethod:pm,SoldBy:sb,ReturnStatus:''}});
        return{...prev,products:up,sales:[...(prev.sales||[]),...nsr]};
      });
      toast(`Sale ${sid} — ${fC(gt)}`,'success');
    }catch(e){toast('Error processing sale','error')}
    sSub(false);
  };

  if(loading) return <SkT/>;

  return (
    <React.Fragment>
      <div className="grid grid-cols-1 lg:grid-cols-5 gap-4 animate-fade-in">
        <div className="lg:col-span-3 space-y-4">
          {/* Quick Search */}
          <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
            <div className="px-4 sm:px-5 py-3 bg-gradient-to-r from-slate-800 to-slate-900 flex items-center justify-between">
              <p className="text-sm font-bold text-white">🛒 Add Items (භාණ්ඩ එකතු කරන්න)</p>
            </div>
            <div className="p-4 space-y-3">
              {/* Quick search bar */}
              <div className="relative">
                <I n="search" s={15} c="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"/>
                <input type="text" placeholder="Quick search — type product name..." value={pq} onChange={e=>sPq(e.target.value)} className="w-full pl-9 pr-4 py-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl input-ring placeholder:text-slate-300"/>
              </div>
              {filteredProds.length>0&&(
                <div className="bg-slate-50 rounded-xl border border-slate-200 divide-y divide-slate-100 animate-scale-in">
                  {filteredProds.map(p=>(
                    <button key={p.ProductID} onClick={()=>quickAdd(p)} className="w-full flex items-center justify-between px-4 py-2.5 hover:bg-brand-50 transition-colors text-left">
                      <div><p className="text-sm font-medium text-slate-700">{p.ProductName}</p><p className="text-[10px] text-slate-400">{p.Brand} • Stock: {p.StockQty}</p></div>
                      <div className="text-right"><p className="text-sm font-bold text-brand-600">{fC(p.UnitPrice)}</p><span className="text-[9px] text-brand-500">+ Add</span></div>
                    </button>
                  ))}
                </div>
              )}
              <div className="flex flex-col sm:flex-row gap-3">
                <div className="flex-1">
                  <select value={sp} onChange={e=>{sSp(e.target.value);sAq(1)}} className="w-full pl-4 pr-10 py-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl input-ring appearance-none">
                    <option value="">— Or select from list —</option>
                    {prods.map(p=><option key={p.ProductID} value={p.ProductID}>{p.ProductName} — {fC(p.UnitPrice)} ({p.StockQty})</option>)}
                  </select>
                </div>
                <div className="flex items-center gap-2">
                  <div className="flex items-center bg-slate-100 rounded-xl border border-slate-200">
                    <button onClick={()=>sAq(Math.max(1,aq-1))} className="px-3 py-2.5 text-slate-500 active:bg-slate-200"><I n="minus" s={14}/></button>
                    <span className="px-3 text-sm font-bold">{aq}</span>
                    <button onClick={()=>sAq(Math.min(aq+1,selP?selP.StockQty:99))} className="px-3 py-2.5 text-slate-500 active:bg-slate-200"><I n="plus" s={14}/></button>
                  </div>
                  <button onClick={addC} disabled={!selP} className="px-5 py-2.5 bg-gradient-to-r from-brand-600 to-brand-700 text-white text-sm font-bold rounded-xl disabled:opacity-40 active:scale-95 transition-transform"><I n="plus" s={16} c="inline -mt-0.5 mr-1"/>Add</button>
                </div>
              </div>
            </div>
          </div>

          {/* Cart */}
          <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
            <div className="px-4 py-3 border-b border-slate-100 flex items-center justify-between">
              <div className="flex items-center gap-2"><I n="shopping-cart" s={16} c="text-brand-500"/><span className="text-sm font-bold text-slate-800">Cart</span>{cart.length>0&&<span className="bg-brand-600 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full">{cart.length}</span>}</div>
              {cart.length>0&&<button onClick={()=>setCart([])} className="text-[11px] font-semibold text-rose-500 hover:text-rose-600">Clear All</button>}
            </div>
            {cart.length===0?(
              <div className="py-12 text-center"><div className="animate-float"><I n="shopping-cart" s={32} c="mx-auto text-slate-200 mb-3"/></div><p className="text-sm text-slate-400">Cart is empty</p><p className="text-xs text-slate-300 mt-1">භාණ්ඩ search කරලා add කරන්න</p></div>
            ):(
              <div className="divide-y divide-slate-50">
                {cart.map((c,i)=>(
                  <div key={c.pid} className="px-4 py-3 flex items-center gap-3 animate-cart-pop" style={{animationDelay:`${i*40}ms`}}>
                    <div className="flex-1 min-w-0"><p className="text-sm font-semibold text-slate-800 truncate">{c.name}</p><p className="text-[10px] text-slate-400">{c.brand} • {fC(c.up)} each</p></div>
                    <div className="flex items-center bg-slate-100 rounded-lg border border-slate-200">
                      <button onClick={()=>{if(c.qty<=1)setCart(cart.filter(x=>x.pid!==c.pid));else setCart(cart.map(x=>x.pid===c.pid?{...x,qty:x.qty-1}:x))}} className="px-2 py-1 text-slate-500"><I n="minus" s={12}/></button>
                      <span className="px-2 text-sm font-bold">{c.qty}</span>
                      <button onClick={()=>{const pr=data?.products?.find(x=>x.ProductID===c.pid);if(pr&&c.qty<pr.StockQty)setCart(cart.map(x=>x.pid===c.pid?{...x,qty:x.qty+1}:x))}} className="px-2 py-1 text-slate-500"><I n="plus" s={12}/></button>
                    </div>
                    <span className="text-sm font-bold text-slate-800 min-w-[70px] text-right">{fC(c.up*c.qty)}</span>
                    <button onClick={()=>setCart(cart.filter(x=>x.pid!==c.pid))} className="p-1 text-slate-400 hover:text-rose-500"><I n="trash-2" s={14}/></button>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>

        {/* Right Panel */}
        <div className="lg:col-span-2 space-y-4">
          <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-4 space-y-3">
            <p className="text-xs font-bold text-slate-500 uppercase">👤 Customer Info</p>
            <input type="text" placeholder="Customer name (පාරිභෝගිකයාගේ නම)" value={cn} onChange={e=>sCn(e.target.value)} className="w-full px-4 py-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl input-ring placeholder:text-slate-300"/>
            <div>
              <input type="tel" placeholder="Phone — WhatsApp (දු.ක. අංකය)" value={cp} onChange={e=>sCp(e.target.value)} className="w-full px-4 py-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl input-ring placeholder:text-slate-300"/>
              {cp&&!isValidPhone(cp)&&<p className="text-[10px] text-amber-500 mt-1 flex items-center gap-1"><I n="alert-circle" s={10}/>Valid phone required (e.g. 0771234567)</p>}
            </div>
            <div className="flex gap-2">
              <div className="relative flex-1"><span className="absolute left-3 top-1/2 -translate-y-1/2 text-xs text-slate-400">%</span><input type="number" min="0" max="100" value={dp} onChange={e=>sDp(Math.max(0,Math.min(100,parseInt(e.target.value)||0)))} className="w-full pl-8 pr-3 py-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl input-ring" placeholder="Discount"/></div>
              <select value={sb} onChange={e=>sSb(e.target.value)} className="px-4 py-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl input-ring appearance-none"><option>Nimal</option><option>Sunil</option><option>Admin</option></select>
            </div>
          </div>

          {/* Order Summary */}
          <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-4 space-y-2 text-sm">
            <p className="text-xs font-bold text-slate-500 uppercase mb-2">📋 Order Summary</p>
            {cart.map(c=><div key={c.pid} className="flex justify-between"><span className="text-slate-500 truncate max-w-[140px]">{c.name} ×{c.qty}</span><span className="font-medium">{fC(c.up*c.qty)}</span></div>)}
            {cart.length>0&&(
              <React.Fragment>
                <div className="border-t pt-2 flex justify-between"><span className="text-slate-500">Subtotal</span><span className="font-semibold">{fC(st)}</span></div>
                {dp>0&&<div className="flex justify-between text-rose-600"><span>Discount (-{dp}%)</span><span>-{fC(da)}</span></div>}
                <div className="flex justify-between text-lg font-extrabold pt-2 border-t-2 border-brand-100"><span>Total</span><span className="text-brand-600">{fC(gt)}</span></div>
              </React.Fragment>
            )}
          </div>

          {/* Payment */}
          <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-4">
            <p className="text-xs font-bold text-slate-500 uppercase mb-3">💳 Payment Method</p>
            <div className="grid grid-cols-3 gap-2 mb-3">
              {[{id:'Cash',l:'Cash',s:'මුදල්',i:'wallet'},{id:'Card',l:'Card',s:'කාඩ්',i:'credit-card'},{id:'Bank Transfer',l:'Bank',s:'බැංකු',i:'landmark'}].map(o=>(
                <button key={o.id} onClick={()=>{sPm(o.id);if(o.id!=='Cash')sCt('')}} className={`p-3 rounded-xl border-2 text-center active:scale-95 transition-all ${pm===o.id?'border-brand-500 bg-brand-50':'border-slate-200 hover:border-slate-300'}`}>
                  <I n={o.i} s={18} c={`mx-auto mb-0.5 ${pm===o.id?'text-brand-600':'text-slate-400'}`}/>
                  <p className={`text-xs font-bold ${pm===o.id?'text-brand-700':'text-slate-600'}`}>{o.l}</p>
                  <p className="text-[9px] text-slate-400">{o.s}</p>
                </button>
              ))}
            </div>
            {pm==='Cash'&&cart.length>0&&(
              <div className="space-y-2 animate-fade-in-fast">
                <div className="relative"><span className="absolute left-4 top-1/2 -translate-y-1/2 text-xs font-bold text-slate-400">Rs.</span><input type="number" value={ct} onChange={e=>sCt(e.target.value)} className="w-full pl-12 pr-4 py-3 text-lg font-bold bg-slate-50 border border-slate-200 rounded-xl input-ring" placeholder="0"/></div>
                <div className="flex gap-1.5 flex-wrap">

const SalesHistory=({data,loading})=>{
  const [q,sQ]=useState('');
  const [fp,sFp]=useState('All');
  const [viewS,setViewS]=useState(null);

  const grouped=useMemo(()=>{
    if(!data?.sales) return [];
    const g={};
    data.sales.forEach(s=>{
      if(!g[s.SaleID]) g[s.SaleID]={id:s.SaleID,date:s.Date,cust:s.CustomerName,phone:s.CustomerPhone,pay:s.PaymentMethod,soldBy:s.SoldBy,items:[],total:0,discount:Number(s.DiscountPct)||0};
      g[s.SaleID].items.push(s);
      g[s.SaleID].total+=Number(s.TotalAmount)||0;
    });
    return Object.values(g).sort((a,b)=>new Date(b.date)-new Date(a.date));
  },[data]);

  const filtered=useMemo(()=>{
    return grouped.filter(s=>{
      const m=!q||s.cust.toLowerCase().includes(q.toLowerCase())||s.id.toLowerCase().includes(q.toLowerCase())||s.items.some(i=>i.ProductName.toLowerCase().includes(q.toLowerCase()));
      return m&&(fp==='All'||s.pay===fp);
    });
  },[grouped,q,fp]);

  const totalRev=filtered.reduce((s,x)=>s+x.total,0);
  const cashCount=grouped.filter(s=>s.pay==='Cash').length;
  const cardCount=grouped.filter(s=>s.pay==='Card').length;

  if(loading) return <SkT/>;

  return (
    <div className="space-y-4 animate-fade-in">
      <div className="grid grid-cols-2 xl:grid-cols-4 gap-3">
        <SC title="Total Sales" si="සමස්ත විකුණුම්" value={grouped.length} icon="shopping-cart" grad="from-brand-400 to-brand-600"/>
        <SC title="Revenue" si="මුළු ආදායම" value={fC(grouped.reduce((s,x)=>s+x.total,0))} icon="dollar-sign" grad="from-emerald-400 to-emerald-600" delay={80}/>
        <SC title="Cash Sales" si="මුදල් විකුණුම්" value={cashCount} icon="wallet" grad="from-amber-400 to-amber-600" delay={160}/>
        <SC title="Card Sales" si="කාඩ් විකුණුම්" value={cardCount} icon="credit-card" grad="from-violet-400 to-violet-600" delay={240}/>
      </div>

      <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
        <div className="px-4 sm:px-5 py-3 sm:py-4 border-b border-slate-100">
          <div className="flex flex-col sm:flex-row items-start sm:items-center gap-3 justify-between">
            <div className="relative w-full sm:w-72">
              <I n="search" s={15} c="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"/>
              <input type="text" placeholder="Search sales..." value={q} onChange={e=>sQ(e.target.value)} className="w-full pl-9 pr-4 py-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl input-ring placeholder:text-slate-300"/>
            </div>
            <div className="flex gap-1.5">
              {['All','Cash','Card','Bank Transfer'].map(p=><button key={p} onClick={()=>sFp(p)} className={`px-2.5 py-1 text-[10px] font-semibold rounded-lg active:scale-95 ${fp===p?'bg-brand-600 text-white':'bg-slate-100 text-slate-500'}`}>{p==='Bank Transfer'?'Bank':p}</button>)}
            </div>
          </div>
        </div>
        <div className="overflow-x-auto">
          <table className="w-full min-w-[600px]">
            <thead><tr className="bg-slate-50/80">
              <th className="text-left px-5 py-3 text-[10px] font-semibold text-slate-500 uppercase">Sale ID</th>
              <th className="text-left px-4 py-3 text-[10px] font-semibold text-slate-500 uppercase">Date</th>
              <th className="text-left px-4 py-3 text-[10px] font-semibold text-slate-500 uppercase">Customer</th>
              <th className="text-center px-4 py-3 text-[10px] font-semibold text-slate-500 uppercase">Items</th>
              <th className="text-center px-4 py-3 text-[10px] font-semibold text-slate-500 uppercase">Payment</th>
              <th className="text-right px-5 py-3 text-[10px] font-semibold text-slate-500 uppercase">Amount</th>
            </tr></thead>
            <tbody>
              {filtered.length===0?<tr><td colSpan="6" className="px-6 py-14 text-center text-sm text-slate-400">No sales found</td></tr>:
              filtered.map(s=>(
                <tr key={s.id} className="rh border-b border-slate-50 cursor-pointer" onClick={()=>setViewS(s)}>
                  <td className="px-5 py-3"><span className="text-xs font-bold text-brand-600 bg-brand-50 px-2 py-0.5 rounded">{s.id}</span></td>
                  <td className="px-4 py-3 text-xs text-slate-500">{fDT(s.date)}</td>
                  <td className="px-4 py-3"><p className="text-sm font-medium text-slate-700">{s.cust}</p><p className="text-[10px] text-slate-400">{s.phone}</p></td>
                  <td className="px-4 py-3 text-center"><span className="text-sm font-semibold text-slate-700">{s.items.length}</span></td>
                  <td className="px-4 py-3 text-center"><span className={`text-[10px] font-semibold px-2 py-0.5 rounded-full border ${s.pay==='Cash'?'text-emerald-700 bg-emerald-50 border-emerald-200':s.pay==='Card'?'text-violet-700 bg-violet-50 border-violet-200':'text-blue-700 bg-blue-50 border-blue-200'}`}>{s.pay}</span></td>
                  <td className="px-5 py-3 text-right text-sm font-bold text-slate-800">{fC(s.total)}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <div className="px-5 py-2 bg-slate-50/50 border-t border-slate-100 flex justify-between"><p className="text-[10px] text-slate-400">{filtered.length} sales</p><p className="text-[10px] font-semibold text-slate-500">Total: {fC(totalRev)}</p></div>
      </div>

      {/* Sale Detail Modal */}
      <Modal open={!!viewS} onClose={()=>setViewS(null)}>
        {viewS&&(
          <React.Fragment>
            <div className="bg-gradient-to-r from-brand-600 to-violet-600 px-5 py-4 flex items-center justify-between flex-shrink-0">
              <div><h3 className="text-base font-bold text-white">Sale {viewS.id}</h3><p className="text-xs text-brand-200">{fDT(viewS.date)}</p></div>
              <button onClick={()=>setViewS(null)} className="p-2 rounded-lg hover:bg-white/10 text-white"><I n="x" s={18}/></button>
            </div>
            <div className="p-5 space-y-3 overflow-y-auto flex-1">
              <div className="grid grid-cols-2 gap-3 text-sm">
                <div className="p-3 bg-slate-50 rounded-xl"><p className="text-[10px] text-slate-400 uppercase">Customer</p><p className="font-semibold text-slate-800">{viewS.cust}</p><p className="text-xs text-slate-500">{viewS.phone}</p></div>
                <div className="p-3 bg-slate-50 rounded-xl"><p className="text-[10px] text-slate-400 uppercase">Payment</p><p className="font-semibold text-slate-800">{viewS.pay}</p><p className="text-xs text-slate-500">By: {viewS.soldBy}</p></div>
              </div>
              <div className="border rounded-xl overflow-hidden">
                <table className="w-full text-sm">
                  <thead><tr className="bg-slate-50"><th className="text-left px-4 py-2 text-[10px] text-slate-500">Product</th><th className="text-center px-2 py-2 text-[10px] text-slate-500">Qty</th><th className="text-right px-4 py-2 text-[10px] text-slate-500">Amount</th></tr></thead>
                  <tbody>{viewS.items.map((it,i)=>(
                    <tr key={i} className="border-t border-slate-100"><td className="px-4 py-2.5"><p className="font-medium text-slate-700">{it.ProductName}</p><p className="text-[10px] text-slate-400">{it.ProductID} • {fC(it.UnitPrice)}/ea</p></td><td className="px-2 py-2.5 text-center font-bold">{it.Qty}</td><td className="px-4 py-2.5 text-right font-bold">{fC(it.TotalAmount)}</td></tr>
                  ))}</tbody>
                </table>
              </div>
              {viewS.discount>0&&<div className="flex justify-between text-sm text-rose-600"><span>Discount ({viewS.discount}%)</span><span>Applied</span></div>}
              <div className="flex justify-between text-lg font-extrabold pt-2 border-t-2"><span>Total</span><span className="text-brand-600">{fC(viewS.total)}</span></div>
            </div>
          </React.Fragment>
        )}
      </Modal>
    </div>
  );
};

const Returns=({data,loading,toast,setData})=>{
  const [si,sSi]=useState('');
  const [lk,sLk]=useState(null);
  const [le,sLe]=useState('');
  const [sp,sSp]=useState('');
  const [rq,sRq]=useState(1);
  const [rs,sRs]=useState(RET_REASONS[0]);
  const [pb,sPb]=useState('Nimal');
  const [sub,sSub]=useState(false);

  const doL=()=>{
    if(!si.trim()){sLe('Sale ID enter කරන්න');return}
    sLe('');sLk(null);sSp('');sRq(1);
    const id=si.trim().toUpperCase();
    const lines=(data?.sales||[]).filter(s=>s.SaleID===id);
    if(!lines.length){sLe(`"${id}" — සොයාගත නොහැක`);return}
    const items=lines.map(sl=>{const ar=(data?.returns||[]).filter(r=>r.SaleID===id&&r.ProductID===sl.ProductID&&r.Status==='Completed').reduce((s,r)=>s+(Number(r.Qty)||0),0);return{...sl,ar,mr:Number(sl.Qty)-ar}});
    sLk({id,cust:lines[0].CustomerName,phone:lines[0].CustomerPhone,date:lines[0].Date,items});
  };

  const selI=useMemo(()=>lk?.items?.find(i=>i.ProductID===sp),[lk,sp]);
  const rAmt=useMemo(()=>{if(!selI)return 0;return Math.round(Number(selI.UnitPrice)*(1-(Number(selI.DiscountPct)||0)/100))*rq},[selI,rq]);

  const hSub=async()=>{
    if(!selI||rq<=0||rq>selI.mr) return;
    sSub(true);
    try{
      await new Promise(r=>setTimeout(r,800));
      const rns=(data.returns||[]).map(r=>parseInt(String(r.ReturnID).replace(/\D/g,''))||0);
      const nxt=rns.length>0?Math.max(...rns)+1:1;
      const rid='R'+String(nxt).padStart(4,'0');
      setData(prev=>{
        const prods=(prev.products||[]).map(p=>{if(p.ProductID===sp){const nq=p.StockQty+rq;return{...p,StockQty:nq,Status:nq<=p.MinStockLevel?'Low Stock':'Active'}}return p});
        const sales=(prev.sales||[]).map(s=>{if(s.SaleID===lk.id&&s.ProductID===sp){const nt=(selI.ar||0)+rq;return{...s,ReturnStatus:nt>=Number(s.Qty)?'Returned':'Partial Return'}}return s});
        return{...prev,returns:[...(prev.returns||[]),{ReturnID:rid,Date:new Date().toISOString(),SaleID:lk.id,ProductID:sp,ProductName:selI.ProductName,Qty:rq,Reason:rs,RefundAmount:rAmt,ProcessedBy:pb,Status:'Completed'}],products:prods,sales};
      });
      toast(`${rid} — Refund: ${fC(rAmt)}`,'success');
      sSi('');sLk(null);sSp('');
    }catch(e){toast('Return process error','error')}
    sSub(false);
  };

  if(loading) return <SkT/>;
  const hist=[...(data.returns||[])].sort((a,b)=>new Date(b.Date)-new Date(a.Date));
  const totalSales=data.sales?[...new Set(data.sales.map(s=>s.SaleID))].length:0;

  return (
    <div className="space-y-4 animate-fade-in">
      <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
        <SC title="Returns" si="ආපසු" value={data.returns?.length||0} icon="rotate-ccw" grad="from-amber-400 to-orange-500"/>
        <SC title="Refunded" si="ආපසු මුදල" value={fC((data.returns||[]).reduce((s,r)=>s+(Number(r.RefundAmount)||0),0))} icon="dollar-sign" grad="from-rose-400 to-rose-600" delay={80}/>
        <SC title="Rate" si="අනුපාතය" value={totalSales>0?((data.returns?.length||0)/totalSales*100).toFixed(1)+'%':'0%'} icon="bar-chart" grad="from-brand-400 to-brand-600" delay={160}/>
      </div>

      <div className="grid grid-cols-1 xl:grid-cols-5 gap-4">
        <div className="xl:col-span-2 bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden animate-slide-left">
          <div className="px-5 py-4 bg-gradient-to-r from-amber-500 to-orange-500"><p className="text-sm font-bold text-white">🔄 Process Return (ආපසු සැකසීම)</p></div>
          <div className="p-5 space-y-4">
            <div className="flex gap-2"><input type="text" placeholder="Sale ID (e.g. S0003)" value={si} onChange={e=>{sSi(e.target.value);sLe('')}} onKeyDown={e=>{if(e.key==='Enter')doL()}} className="flex-1 px-4 py-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl font-mono input-ring placeholder:text-slate-300"/><button onClick={doL} className="px-4 py-2.5 bg-brand-600 text-white text-sm font-bold rounded-xl active:scale-95"><I n="search" s={14}/></button></div>
            {le&&<p className="text-xs text-rose-500 flex items-center gap-1"><I n="alert-circle" s={14}/>{le}</p>}
            {lk&&(
              <div className="animate-fade-in space-y-4">
                <div className="p-3 bg-brand-50 rounded-xl border border-brand-100"><span className="text-xs font-bold text-brand-600">{lk.id}</span><span className="text-xs text-slate-500 ml-2">{fD(lk.date)}</span><p className="text-sm font-semibold text-slate-800 mt-1">{lk.cust}</p></div>
                <select value={sp} onChange={e=>{sSp(e.target.value);sRq(1)}} className="w-full px-4 py-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl input-ring appearance-none"><option value="">— Product —</option>{lk.items.filter(i=>i.mr>0).map(i=><option key={i.ProductID} value={i.ProductID}>{i.ProductName} (Max:{i.mr})</option>)}</select>
                {selI&&(
                  <React.Fragment>
                    <div className="grid grid-cols-2 gap-3">
                      <div><label className="text-[10px] text-slate-500 font-semibold">Qty</label><input type="number" min="1" max={selI.mr} value={rq} onChange={e=>sRq(Math.max(1,Math.min(selI.mr,parseInt(e.target.value)||1)))} className="w-full px-4 py-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl input-ring mt-1"/></div>
                      <div><label className="text-[10px] text-slate-500 font-semibold">By</label><select value={pb} onChange={e=>sPb(e.target.value)} className="w-full px-4 py-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl input-ring appearance-none mt-1"><option>Nimal</option><option>Sunil</option><option>Admin</option></select></div>
                    </div>
                    <select value={rs} onChange={e=>sRs(e.target.value)} className="w-full px-4 py-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl input-ring appearance-none">{RET_REASONS.map(r=><option key={r}>{r}</option>)}</select>
                    <div className="p-3 bg-emerald-50 border border-emerald-200 rounded-xl flex justify-between animate-scale-in"><span className="text-sm font-semibold text-emerald-700">Refund Amount</span><span className="text-lg font-extrabold text-emerald-600">{fC(rAmt)}</span></div>
                    <button onClick={hSub} disabled={sub} className="w-full py-3 bg-gradient-to-r from-amber-500 to-orange-500 text-white font-bold text-sm rounded-xl disabled:opacity-50 active:scale-[.98] flex items-center justify-center gap-2">
                      {sub?<React.Fragment><I n="loader" s={16} c="animate-spin"/>Processing...</React.Fragment>:<React.Fragment><I n="rotate-ccw" s={16}/>Process Return</React.Fragment>}
                    </button>
                  </React.Fragment>
                )}
              </div>
            )}
          </div>
        </div>

        <div className="xl:col-span-3 bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
          <div className="px-5 py-4 border-b border-slate-100"><h3 className="text-sm font-bold text-slate-800">📋 Return History (ආපසු ඉතිහාසය)</h3></div>
          <div className="overflow-x-auto">
            <table className="w-full min-w-[500px]">
              <thead><tr className="bg-slate-50/80">
                <th className="text-left px-4 py-3 text-[10px] font-semibold text-slate-500 uppercase">ID</th>
                <th className="text-left px-4 py-3 text-[10px] font-semibold text-slate-500 uppercase">Product</th>
                <th className="text-center px-4 py-3 text-[10px] font-semibold text-slate-500 uppercase">Qty</th>
                <th className="text-right px-4 py-3 text-[10px] font-semibold text-slate-500 uppercase">Refund</th>
                <th className="text-center px-4 py-3 text-[10px] font-semibold text-slate-500 uppercase">Status</th>
              </tr></thead>
              <tbody>
                {hist.length===0?<tr><td colSpan="5" className="px-6 py-12 text-center text-sm text-slate-400">No returns yet</td></tr>:
                hist.map(r=>(
                  <tr key={r.ReturnID} className="rh border-b border-slate-50">
                    <td className="px-4 py-3"><span className="text-xs font-bold text-amber-600 bg-amber-50 px-1.5 py-0.5 rounded">{r.ReturnID}</span><br/><span className="text-[10px] text-slate-400">{r.SaleID} • {fD(r.Date)}</span></td>
                    <td className="px-4 py-3"><p className="text-sm text-slate-700 truncate max-w-[140px]">{r.ProductName}</p><p className="text-[10px] text-slate-400">{r.Reason?.substring(0,25)}</p></td>
                    <td className="px-4 py-3 text-center text-sm font-bold">{r.Qty}</td>
                    <td className="px-4 py-3 text-right text-sm font-bold text-rose-600">{fC(r.RefundAmount)}</td>
                    <td className="px-4 py-3 text-center"><span className="text-[10px] font-semibold text-emerald-700 bg-emerald-50 px-2 py-0.5 rounded-full border border-emerald-200">✓ Done</span></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  );
};

// ============================================================
// WARRANTY
// ============================================================
const Warranty=({data,loading})=>{
  const [q,sQ]=useState('');
  const [sf,sSf]=useState('All');

  const recs=useMemo(()=>{
    if(!data?.sales||!data?.products) return [];
    const now=new Date();
    const seen=new Set();
    return data.sales.map((sale,saleIdx)=>{
      const prod=data.products.find(p=>p.ProductID===sale.ProductID);
      if(!prod||!Number(prod.WarrantyMonths)) return null;
      const key=`${sale.SaleID}_${sale.ProductID}`;
      if(seen.has(key)) return null;
      seen.add(key);
      const sd=new Date(sale.Date);const ex=new Date(sd);ex.setMonth(ex.getMonth()+Number(prod.WarrantyMonths));
      const dl=Math.ceil((ex-now)/864e5);const td=Math.ceil((ex-sd)/864e5);const pct=td>0?Math.max(0,Math.min(100,(dl/td)*100)):0;
      const isRet=(data.returns||[]).some(r=>r.SaleID===sale.SaleID&&r.ProductID===sale.ProductID&&r.Status==='Completed');
      const status=isRet?'Returned':dl<=0?'Expired':dl<=30?'Expiring Soon':'Active';
      return{key:`${key}_${saleIdx}`,saleId:sale.SaleID,pid:sale.ProductID,name:sale.ProductName,brand:prod.Brand,cust:sale.CustomerName,phone:sale.CustomerPhone,sd:sale.Date,ex:ex.toISOString(),wm:prod.WarrantyMonths,dl:Math.max(0,dl),pct,status};
    }).filter(Boolean);
  },[data]);

  const filtered=useMemo(()=>recs.filter(w=>{const ms=!q||w.name.toLowerCase().includes(q.toLowerCase())||w.cust.toLowerCase().includes(q.toLowerCase())||w.saleId.toLowerCase().includes(q.toLowerCase())||(w.phone||'').includes(q);return ms&&(sf==='All'||w.status===sf)}),[recs,q,sf]);
  const cnt=useMemo(()=>{const c={Active:0,'Expiring Soon':0,Expired:0,Returned:0};recs.forEach(w=>{if(c[w.status]!==undefined)c[w.status]++});return c},[recs]);

  if(loading) return <div className="space-y-4"><div className="grid grid-cols-2 xl:grid-cols-4 gap-3"><SkC/><SkC/><SkC/><SkC/></div><SkT/></div>;

  const badge=s=>{
    const st={'Active':'text-emerald-700 bg-emerald-50 border-emerald-200','Expiring Soon':'text-amber-700 bg-amber-50 border-amber-200','Expired':'text-rose-700 bg-rose-50 border-rose-200','Returned':'text-slate-500 bg-slate-100 border-slate-200'};
    const dt={'Active':'bg-emerald-500','Expiring Soon':'bg-amber-500 animate-pulse-dot','Expired':'bg-rose-500','Returned':'bg-slate-400'};
    return <span className={`inline-flex items-center gap-1 text-[10px] font-semibold px-2 py-0.5 rounded-full border ${st[s]||st.Active}`}><span className={`w-1.5 h-1.5 rounded-full ${dt[s]||dt.Active}`}/>{s}</span>;
  };

  return (
    <div className="space-y-4 animate-fade-in">
      <div className="grid grid-cols-2 xl:grid-cols-4 gap-3">
        <SC title="Active" si="ක්‍රියාකාරී" value={cnt.Active} icon="shield-check" grad="from-emerald-400 to-emerald-600"/>
        <SC title="Expiring" si="අවසන් වෙමින්" value={cnt['Expiring Soon']} icon="alert-triangle" grad="from-amber-400 to-amber-500" delay={80}/>
        <SC title="Expired" si="කල් ඉකුත්" value={cnt.Expired} icon="alert-circle" grad="from-rose-400 to-rose-600" delay={160}/>
        <SC title="Total" si="සියල්ල" value={recs.length} icon="clipboard" grad="from-brand-400 to-brand-600" delay={240}/>
      </div>

      <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
        <div className="px-4 sm:px-5 py-3 sm:py-4 border-b border-slate-100">
          <div className="flex flex-col sm:flex-row items-start sm:items-center gap-3 justify-between">
            <div className="relative w-full sm:w-72"><I n="search" s={15} c="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"/><input type="text" placeholder="Search warranty..." value={q} onChange={e=>sQ(e.target.value)} className="w-full pl-9 pr-4 py-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl input-ring placeholder:text-slate-300"/></div>
            <div className="flex gap-1.5 flex-wrap">
              {['All','Active','Expiring Soon','Expired','Returned'].map(s=><button key={s} onClick={()=>sSf(s)} className={`px-2 py-1 text-[10px] font-semibold rounded-lg active:scale-95 ${sf===s?'bg-brand-600 text-white':'bg-slate-100 text-slate-500'}`}>{s}{s!=='All'&&<span className="ml-0.5 opacity-70">({cnt[s]||0})</span>}</button>)}
            </div>
          </div>
        </div>
        <div className="overflow-x-auto">
          <table className="w-full min-w-[600px]">
            <thead><tr className="bg-slate-50/80">
              <th className="text-left px-5 py-3 text-[10px] font-semibold text-slate-500 uppercase">Product</th>
              <th className="text-left px-4 py-3 text-[10px] font-semibold text-slate-500 uppercase">Customer</th>
              <th className="text-left px-4 py-3 text-[10px] font-semibold text-slate-500 uppercase">Expires</th>
              <th className="text-center px-4 py-3 text-[10px] font-semibold text-slate-500 uppercase">Left</th>
              <th className="text-center px-4 py-3 text-[10px] font-semibold text-slate-500 uppercase">Status</th>
            </tr></thead>
            <tbody>
              {filtered.length===0?<tr><td colSpan="5" className="px-6 py-14 text-center text-sm text-slate-400">No records found</td></tr>:
              filtered.map(w=>(
                <tr key={w.key} className="rh border-b border-slate-50">
                  <td className="px-5 py-3.5"><p className="text-sm font-semibold text-slate-800 truncate max-w-[170px]">{w.name}</p><span className="text-[10px] text-brand-500 font-mono bg-brand-50 px-1.5 py-0.5 rounded">{w.saleId}</span><span className="text-[10px] text-slate-300 ml-1">{w.wm}mo</span></td>
                  <td className="px-4 py-3.5"><p className="text-sm text-slate-700">{w.cust}</p><p className="text-[10px] text-slate-400">{w.phone}</p></td>
                  <td className="px-4 py-3.5 text-xs text-slate-500">{fD(w.ex)}</td>
                  <td className="px-4 py-3.5"><div className="flex flex-col items-center"><span className={`text-xs font-bold ${w.status==='Active'?'text-emerald-600':w.status==='Expiring Soon'?'text-amber-600':'text-slate-400'}`}>{w.status==='Expired'||w.status==='Returned'?'—':`${w.dl}d`}</span><div className="w-16 h-1.5 bg-slate-100 rounded-full mt-1 overflow-hidden"><div className={`h-full rounded-full transition-all ${w.status==='Active'?'bg-emerald-500':w.status==='Expiring Soon'?'bg-amber-500':'bg-rose-500'}`} style={{width:`${w.pct}%`}}/></div></div></td>
                  <td className="px-4 py-3.5 text-center">{badge(w.status)}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        {filtered.length>0&&<div className="px-4 py-2 bg-slate-50/50 border-t border-slate-100"><p className="text-[10px] text-slate-400">{filtered.length} of {recs.length}</p></div>}
      </div>
    </div>
  );
};

// ============================================================
// APP
// ============================================================
const App=()=>{
  const [tab,setTab]=useState('dashboard');
  const [open,setOpen]=useState(false);
  const [data,setData]=useState(null);
  const [loading,setLoading]=useState(true);
  const [toasts,setToasts]=useState([]);
  const [cached,setCached]=useState(false);
  const dataLoadedRef=useRef(false);

  const toast=useCallback((msg,type='success')=>{const id=Date.now()+Math.random();setToasts(p=>[...p,{id,message:msg,type}]);setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),4500)},[]);
  const rmToast=useCallback(id=>setToasts(p=>p.filter(t=>t.id!==id)),[]);

  useEffect(()=>{if(data){saveToLS(data);dataLoadedRef.current=true}},[data]);

  const lowCount=useMemo(()=>(data?.products||[]).filter(p=>p.Status==='Low Stock'||p.StockQty<=p.MinStockLevel).length,[data]);

  const fetchData=useCallback(async()=>{
    setLoading(true);setCached(false);
    const lsData=loadFromLS();
    if(lsData&&!dataLoadedRef.current){setData(lsData);setCached(true);setLoading(false)}
    try{
      if(API_URL&&API_URL!=='YOUR_DEPLOYED_APPS_SCRIPT_URL_HERE'){
        const r=await fetch(API_URL);const j=await r.json();
        if(j.success&&j.data){setData(j.data);setCached(false);setLoading(false);return}
      }
    }catch(e){console.warn('API unavailable:',e.message)}
    if(!dataLoadedRef.current&&!lsData){setTimeout(()=>{setData(MOCK);setLoading(false)},600)}else{setLoading(false)}
  },[]);

  useEffect(()=>{fetchData()},[fetchData]);

  return (
    <div className="min-h-screen">
      <Sidebar tab={tab} setTab={setTab} open={open} setOpen={setOpen} lowCount={lowCount}/>
      <div className="lg:ml-[280px] min-h-screen flex flex-col">
        <Header tab={tab} setOpen={setOpen} onRefresh={fetchData} loading={loading} cached={cached}/>
        <main className="flex-1 p-3 sm:p-6 lg:p-8">
          {tab==='dashboard'&&<Dashboard data={data} loading={loading}/>}
          {tab==='products'&&<Products data={data} loading={loading} toast={toast} setData={setData}/>}
          {tab==='new-sale'&&<NewSale data={data} loading={loading} toast={toast} setData={setData}/>}
          {tab==='sales-history'&&<SalesHistory data={data} loading={loading}/>}
          {tab==='returns'&&<Returns data={data} loading={loading} toast={toast} setData={setData}/>}
          {tab==='warranty'&&<Warranty data={data} loading={loading}/>}
        </main>
        <footer className="px-3 sm:px-8 py-3 border-t border-slate-200 bg-white/60 backdrop-blur-sm">
          <div className="flex flex-col sm:flex-row items-center justify-between gap-1">
            <p className="text-[10px] text-slate-400">&copy; {new Date().getFullYear()} <span className="font-semibold text-slate-500">Mahesh Web App Solution</span></p>
            <p className="text-[9px] text-slate-300">Liyanage Electronics (ලියනගේ ඉලෙක්ට්‍රොනික්ස්)</p>
          </div>
        </footer>
      </div>
      <Toasts toasts={toasts} rm={rmToast}/>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
